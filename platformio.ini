[env:m5stick-c-plus2]
platform  = espressif32
board     = m5stick-c
framework = arduino
monitor_speed = 115200
upload_port   = COM4
monitor_port  = COM4

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_M5Stick_C_Plus2

lib_deps =
    m5stack/M5Unified @ ^0.2.2
    h2zero/NimBLE-Arduino @ ^1.4.2
    meganetaaan/M5Stack-Avatar @ ^0.10.0
